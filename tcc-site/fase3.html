<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fase 3 - Estilo é Poder</title>
<link rel="stylesheet" href="../css/fase3.css">
</head>
<body>

<div class="container" id="cenario">

    <!-- ZERO + BALÃO -->
    <div class="topo">
        <div class="zero">
            <img src="../img/zero.png" alt="Zero">
        </div>

        <div class="balao">
            <p id="falaZero"></p>
            <div class="botoes-dialogo">
                <button id="btnVoltar">◀</button>
                <button id="btnContinuar">▶</button>
            </div>
        </div>
    </div>

    <!-- DESAFIO -->
    <div id="desafio" class="desafio oculto">

        <h1 id="tituloTeste">Bem-vindo ao Sistema</h1>

        <div class="editor">

            <!-- COLINHA -->
            <div class="colinha">
                <h3>Colinha CSS</h3>
                <pre>
h1 {
  color: green;
  font-size: 40px;
}
                </pre>
            </div>

            <!-- CÓDIGO -->
            <div class="codigo-area">
                <textarea id="codigo" placeholder="Digite seu CSS aqui..."></textarea>
                <button id="btnValidar">Aplicar Estilo</button>
                <button id="btnAjuda">Ajuda (IA)</button>
            </div>

        </div>

        <button id="proximaFase" class="oculto">Próxima Fase</button>

    </div>

</div>

<!-- JANELA IA -->
<div id="janelaIA" class="janela-ia oculto">
    <div class="topo-ia" id="topoIA">
        Assistente IA
        <span id="fecharIA">X</span>
    </div>
    <div id="chatIA" class="chat-ia"></div>
    <div class="entrada-ia">
        <input id="inputIA" placeholder="Digite sua dúvida...">
        <button id="enviarIA">Enviar</button>
    </div>
</div>

<div id="transicao" class="transicao"></div>

<script src="js/save.js"></script>
<script src="../js/fase3.js"></script>
</body>
</html>
